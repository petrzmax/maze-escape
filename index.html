<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%91%BE%3C/text%3E%3C/svg%3E">
    <title>Maze Escape</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div id="hud">
        <div id="timer">00:00</div>
        <div id="message">Find the exit!</div>
    </div>

    <div id="overlay" class="visible">
        <div id="overlayTitle">MAZE ESCAPE</div>
        <div id="overlaySubtitle">Navigate the labyrinth. Avoid the enemy.<br>Find the way out!</div>
        <div id="overlayControls">
            WASD / Arrows — Move &amp; Look<br>
            W/↑ Forward · S/↓ Back · A/D Strafe · ←/→ Turn<br>
            ESC — Pause
        </div>
        <div id="overlayPrompt">Press any key to start</div>
    </div>

    <script src="maze.js"></script>
    <script src="raycaster.js"></script>
    <script src="player.js"></script>
    <script src="enemy.js"></script>
    <script src="audio.js"></script>
    <script src="game.js"></script>
</body>
</html>
