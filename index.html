<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wolfenstein Maze Escape</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div id="hud">
        <div id="timer">00:00</div>
        <div id="message">Find the exit!</div>
    </div>

    <div id="overlay" class="visible">
        <div id="overlayTitle">MAZE ESCAPE</div>
        <div id="overlaySubtitle">Navigate the labyrinth. Avoid the enemy.<br>Find the way out!</div>
        <div id="overlayControls">
            WASD / Arrows — Move &amp; Look<br>
            W/↑ Forward · S/↓ Back · A/D Strafe · ←/→ Turn<br>
            ESC — Pause
        </div>
        <div id="overlayPrompt">Press any key to start</div>
    </div>

    <script src="maze.js"></script>
    <script src="raycaster.js"></script>
    <script src="player.js"></script>
    <script src="enemy.js"></script>
    <script src="game.js"></script>
</body>
</html>
